# https://github.com/dylanaraps/neofetch/wiki/Customizing-Info
print_info() {
    info "OS" distro
    info "Kernel" kernel
    info "Shell" shell
    info "DE" de
    info "Theme" theme
    # info "CPU" cpu
    info "GPU" gpu
    info "RAM" memory
}
kernel_shorthand="on"
shell_version="off"
cpu_brand="on"
cpu_speed="on"
cpu_cores="off"
cpu_temp="off"
gpu_brand="on"
gpu_type="all"
refresh_rate="off"
gtk_shorthand="on"
gtk3="on"
de_version="on"
disk_show=('/')
isk_subtitle="mount"
disk_percent="on"
music_player="auto"
song_format="%artist% - %album% - %title%"
song_shorthand="off"
colors=(229 229 229 229 229 7)
bold="on"
separator=":"
# separator=" •"
col_offset="auto"
image_backend="ascii"
image_source="auto"
ascii_distro="auto"
ascii_colors=(229 229 229 229 229 6)
ascii_bold="on"
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
gap=3
yoffset=0
xoffset=0
